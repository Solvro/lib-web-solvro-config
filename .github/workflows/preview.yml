name: Publish Package Preview

permissions:
  contents: read

on:
  push:
    branches:
      - "**"
    tags:
      - "!**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install
        uses: ./.github/composite-actions/install

      - run: npm exec pkg-pr-new publish -- --commentWithDev --packageManager=npm,pnpm
