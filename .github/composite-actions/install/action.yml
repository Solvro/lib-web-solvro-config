name: "Install"
description: "Sets up Node, and installs dependencies"

runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version-file: ".node-version"
        cache: npm

    - name: Update npm
      shell: bash
      run: |
        NPM_VERSION="$(node -p 'require(`./package.json`).packageManager')"
        npm install --global "$NPM_VERSION"

    - name: Install dependencies
      shell: bash
      run: npm ci
